<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="400" height="300"/>

  <!-- Caixa do filtro de ar -->
  <rect x="80" y="80" width="240" height="160" rx="15" fill="#3d3d5c" stroke="#4a4a6a" stroke-width="2"/>
  <rect x="100" y="100" width="200" height="80" rx="8" fill="#2a2a4a"/>

  <!-- Filtro interno -->
  <rect x="120" y="110" width="160" height="60" rx="5" fill="#5a7a5a" stroke="#6a8a6a" stroke-width="2"/>
  <line x1="140" y1="110" x2="140" y2="170" stroke="#4a6a4a" stroke-width="2"/>
  <line x1="170" y1="110" x2="170" y2="170" stroke="#4a6a4a" stroke-width="2"/>
  <line x1="200" y1="110" x2="200" y2="170" stroke="#4a6a4a" stroke-width="2"/>
  <line x1="230" y1="110" x2="230" y2="170" stroke="#4a6a4a" stroke-width="2"/>
  <line x1="260" y1="110" x2="260" y2="170" stroke="#4a6a4a" stroke-width="2"/>

  <!-- Tampa -->
  <rect x="80" y="60" width="240" height="25" rx="5" fill="#4a4a6a"/>
  <text x="200" y="100" text-anchor="middle" fill="#888" font-size="10">Tampa da caixa</text>

  <!-- Mangueira -->
  <path d="M320 120 Q360 120 360 160 L360 200" fill="none" stroke="#5a5a7a" stroke-width="15" stroke-linecap="round"/>
  <text x="340" y="170" fill="#666" font-size="10">Mangueira</text>

  <!-- Etiqueta -->
  <text x="200" y="200" text-anchor="middle" fill="#6a8" font-size="14">FILTRO DE AR</text>
  <text x="200" y="220" text-anchor="middle" fill="#666" font-size="11">GM 93330597</text>

  <text x="200" y="40" text-anchor="middle" fill="#00d4ff" font-size="18" font-weight="bold">Filtro de Ar</text>
  <text x="200" y="280" text-anchor="middle" fill="#666" font-size="11">Chevrolet Prisma 1.0</text>
</svg>