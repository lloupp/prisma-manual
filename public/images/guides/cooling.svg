<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="400" height="300"/>

  <!-- Radiador -->
  <rect x="100" y="60" width="200" height="100" rx="8" fill="#3a5a4a" stroke="#4a6a5a" stroke-width="2"/>
  <g fill="#2a4a3a">
    <rect x="110" y="70" width="8" height="80"/>
    <rect x="130" y="70" width="8" height="80"/>
    <rect x="150" y="70" width="8" height="80"/>
    <rect x="170" y="70" width="8" height="80"/>
    <rect x="190" y="70" width="8" height="80"/>
    <rect x="210" y="70" width="8" height="80"/>
    <rect x="230" y="70" width="8" height="80"/>
    <rect x="250" y="70" width="8" height="80"/>
    <rect x="270" y="70" width="8" height="80"/>
    <rect x="290" y="70" width="8" height="80"/>
  </g>

  <!-- Tampa -->
  <rect x="100" y="50" width="200" height="15" rx="5" fill="#4a6a5a"/>
  <rect x="180" y="40" width="40" height="15" rx="3" fill="#5a7a6a"/>
  <text x="200" y="50" text-anchor="middle" fill="#8a8" font-size="9">Tampa</text>

  <!-- Mangueiras -->
  <path d="M100 90 Q50 90 50 140 L50 180" fill="none" stroke="#5a6a7a" stroke-width="12" stroke-linecap="round"/>
  <path d="M300 130 Q350 130 350 160 L350 200" fill="none" stroke="#5a6a7a" stroke-width="12" stroke-linecap="round"/>

  <!-- Fluido -->
  <rect x="50" y="175" width="60" height="80" rx="5" fill="#2a4a5a" stroke="#3a5a6a" stroke-width="2"/>
  <rect x="55" y="200" width="50" height="50" fill="#3a6a8a"/>
  <text x="80" y="225" text-anchor="middle" fill="#a8c" font-size="11">FLUIDO</text>

  <text x="200" y="40" text-anchor="middle" fill="#00d4ff" font-size="18" font-weight="bold">Sistema de Arrefecimento</text>
  <text x="200" y="280" text-anchor="middle" fill="#666" font-size="11">Radiador e Mangueiras</text>
</svg>